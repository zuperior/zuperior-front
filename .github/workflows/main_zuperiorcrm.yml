name: Deploy Next.js to Azure Web App

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        run: npm run build

      - name: Zip project
        run: zip -r next-app.zip . -x ".git/*"

      - name: Login to Azure using OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPS_SERVICE_CLIENTID }}
          tenant-id: ${{ secrets.AZUREAPPS_SERVICE_TENANTID }}
          subscription-id: ${{ secrets.AZUREAPPS_SERVICE_SUBSCRIPTIONID }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: "zuperiorcrm"
          package: "next-app.zip"
