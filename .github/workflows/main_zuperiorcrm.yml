name: Build and deploy Next.js app to Azure Web App - zuperiorcrm

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js standalone
        run: npm run build

      - name: Prepare build folder for Azure
        run: |
          mkdir -p build
          cp -R .next/standalone/* build/
          mkdir -p build/.next
          cp -R .next/static build/.next/static
          cp -R .next/server build/.next/server
          cp -R public build/public
          cp package.json build/
          cp package-lock.json build/

      - uses: actions/upload-artifact@v4
        with:
          name: nextjs-build
          path: build

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: nextjs-build
          path: .

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_2CE8D3A2043C48AE89DA10EB067FB447 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_B071EE4A28AC42B7B3265BAA0AC0F3EE }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_B7C7197BED57445FB4311E7F9B67CB3B }}
      - name: Zip artifact for Azure
        run: zip -r nextjs-build.zip .
      - uses: azure/webapps-deploy@v3
        with:
          app-name: zuperiorcrm
          package: nextjs-build.zip
          startup-command: "node server.js"
