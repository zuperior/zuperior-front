name: Deploy Next.js to Azure App Service

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v3

      - name: 🟢 Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🛠 Build Next.js (standalone)
        run: npm run build

      - name: 📂 Prepare deployment bundle
        run: |
          rm -rf deploy
          mkdir deploy

          # standalone server + node_modules
          cp -r .next/standalone deploy/

          # static assets this is why Azure crashed earlier
          mkdir -p deploy/.next
          cp -r .next/static deploy/.next/static

          # public assets
          cp -r public deploy/public || true

          # package.json to allow Azure to install env/runtime support
          cp package.json deploy/
          cp package-lock.json deploy/

          echo "📦 Final build structure:"
          ls -R deploy

      - name: 🚀 Deploy to Azure
        uses: azure/webapps-deploy@v3
        with:
          app-name: YOUR_AZURE_APP_NAME
          publish-profile: ${{ secrets.AZURE_PUBLISH_PROFILE }}
          package: deploy
